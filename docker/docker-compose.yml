version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cadence-postgres
    environment:
      POSTGRES_USER: cadence
      POSTGRES_PASSWORD: cadence_password
      POSTGRES_DB: cadence_edc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadence -d cadence_edc"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: cadence-neo4j
    environment:
      NEO4J_AUTH: neo4j/cadence_password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.3
    container_name: cadence-keycloak
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin_password
      - KC_DB=dev-mem
      - KC_HEALTH_ENABLED=true
    ports:
      - "8080:8080"
    volumes:
      - ./cadence-realm.json:/opt/keycloak/data/import/realm.json
    command: ["start-dev", "--import-realm"]
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e \"GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && cat <&3 | grep \"200 OK\""]
      interval: 10s
      timeout: 5s
      retries: 5

  designer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cadence-designer
    command: ["uvicorn", "apps.designer.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    volumes:
      - ..:/app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=cadence_password
    ports:
      - "8001:8001"
    depends_on:
      neo4j:
        condition: service_healthy

  execution:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cadence-execution
    command: ["sh", "-c", "python -m apps.execution.database.migrate && uvicorn apps.execution.main:app --host 0.0.0.0 --port 8002 --reload"]
    volumes:
      - ..:/app
    environment:
      - POSTGRES_USER=cadence
      - POSTGRES_PASSWORD=cadence_password
      - POSTGRES_DB=cadence_edc
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql+asyncpg://cadence:cadence_password@postgres:5432/cadence_edc
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy

  etmf:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cadence-etmf
    command: ["uvicorn", "apps.etmf.main:app", "--host", "0.0.0.0", "--port", "8003", "--reload"]
    volumes:
      - ..:/app
    environment:
      - ETMF_DATABASE_URL=sqlite+aiosqlite:////app/tmf.db
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy

  ctms:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cadence-ctms
    command: ["uvicorn", "apps.ctms.main:app", "--host", "0.0.0.0", "--port", "8005", "--reload"]
    volumes:
      - ..:/app
    environment:
      - CTMS_DATABASE_URL=sqlite+aiosqlite:////app/ctms.db
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cadence-gateway
    command: ["uvicorn", "apps.gateway.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ..:/app
    environment:
      - DESIGNER_URL=http://designer:8001
      - EXECUTION_URL=http://execution:8002
      - ETMF_URL=http://etmf:8003
      - CTMS_URL=http://ctms:8005
    ports:
      - "8000:8000"
    depends_on:
      designer:
        condition: service_started
      execution:
        condition: service_started
      etmf:
        condition: service_started
      ctms:
        condition: service_started
      keycloak:
        condition: service_healthy

volumes:
  postgres_data:
  neo4j_data:

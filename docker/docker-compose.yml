version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cadence-postgres
    environment:
      POSTGRES_USER: cadence
      POSTGRES_PASSWORD: cadence_password
      POSTGRES_DB: cadence_edc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadence -d cadence_edc"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: cadence-neo4j
    environment:
      NEO4J_AUTH: neo4j/cadence_password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  designer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cadence-designer
    command: ["uvicorn", "apps.designer.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    volumes:
      - ..:/app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=cadence_password
    ports:
      - "8001:8001"
    depends_on:
      neo4j:
        condition: service_healthy

  execution:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cadence-execution
    command: ["uvicorn", "apps.execution.main:app", "--host", "0.0.0.0", "--port", "8002", "--reload"]
    volumes:
      - ..:/app
    environment:
      - POSTGRES_USER=cadence
      - POSTGRES_PASSWORD=cadence_password
      - POSTGRES_DB=cadence_edc
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql+asyncpg://cadence:cadence_password@postgres:5432/cadence_edc
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cadence-gateway
    command: ["uvicorn", "apps.gateway.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ..:/app
    environment:
      - DESIGNER_URL=http://designer:8001
      - EXECUTION_URL=http://execution:8002
    ports:
      - "8000:8000"
    depends_on:
      - designer
      - execution

volumes:
  postgres_data:
  neo4j_data:

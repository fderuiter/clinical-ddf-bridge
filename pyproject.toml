[tool.poetry]
name = "cadence-clinical"
version = "0.1.0"
description = "The Metadata-Driven Clinical Execution Platform"
authors = ["Frederick de Ruiter <fpderutier@gmail.com>"]
readme = "README.md"
packages = [
    { include = "apps" },
    { include = "packages" }
]

[tool.poetry.dependencies]
python = "^3.11"
fastapi = "^0.110.0"
uvicorn = {extras = ["standard"], version = "^0.28.0"}
pydantic = "^2.6.0"
httpx = "^0.27.0"
# Designer / MDR Dependencies
neo4j = "^5.18.0"
# Execution / EDC Dependencies
sqlalchemy = "^2.0.28"
asyncpg = "^0.29.0"
# Gateway & Auth
python-jose = {extras = ["cryptography"], version = "^3.3.0"}

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
pytest-asyncio = "^0.23.0"
ruff = "^0.3.0"
black = "^24.2.0"
aiosqlite = "^0.22.1"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "clinical-ddf-bridge"
version = "0.1.0"
description = "Integration middleware connecting OpenStudyBuilder and OpenClinica"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn>=0.28.0",
    "httpx>=0.27.0",
    "pydantic>=2.6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.3.0",
]

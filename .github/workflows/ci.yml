name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test and Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: cadence
          POSTGRES_PASSWORD: cadence_password
          POSTGRES_DB: cadence_edc
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Node dependencies
        run: pnpm install

      - name: Run frontend checks
        run: pnpm check

      - name: Run linting
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run ADR validation
        run: python3 scripts/validate_adrs.py
      - name: Run static analysis
        run: uv run bandit -c pyproject.toml -ll -ii -r apps packages

      - name: Run dependency audit
        run: uv run pip-audit --ignore-vuln PYSEC-2026-1325

      - name: Run tests and coverage
        env:
          TEST_DATABASE_URL: "postgresql+asyncpg://cadence:cadence_password@localhost:5432/cadence_edc"
        run: uv run pytest
  classify:
    name: Classify Change
    runs-on: ubuntu-latest
    outputs:
      is_safe: ${{ steps.classify.outputs.is_safe }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Fetch list of changed files
        id: classify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --paginate --jq '.[] | .filename, (select(has("previous_filename")) | .previous_filename)' > changed_files.tmp
          sort -u changed_files.tmp > changed_files.txt
          cat changed_files.txt
          
          if [ ! -s changed_files.txt ]; then
            echo "No files changed."
            echo "is_safe=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          SAFE=true
          while IFS= read -r file; do
            if [[ "$file" == docs/* ]] || [[ "$file" == *.md ]] || [[ "$file" == tests/* ]] || [[ "$file" == *.sh ]] || [[ "$file" == scripts/* ]]; then
              echo "Safe file: $file"
            else
              echo "Unsafe file: $file"
              SAFE=false
              break
            fi
          done < changed_files.txt
          
          echo "is_safe=$SAFE" >> $GITHUB_OUTPUT

      - name: Apply label
        if: steps.classify.outputs.is_safe == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label "safe-change"

  automerge:
    name: Approve and Automerge
    needs: [classify, test]
    if: needs.classify.outputs.is_safe == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Approve Pull Request
        env:
          GH_TOKEN: ${{ secrets.SERVICE_ACCOUNT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --approve --body "Programmatic approval: Verified safe non-GxP change."
      
      - name: Enable Automerge
        env:
          GH_TOKEN: ${{ secrets.SERVICE_ACCOUNT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --auto --squash

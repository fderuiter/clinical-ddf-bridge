name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test and Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: cadence
          POSTGRES_PASSWORD: cadence_password
          POSTGRES_DB: cadence_edc
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Node dependencies
        run: pnpm install

      - name: Run frontend checks
        run: pnpm check

      - name: Run linting
        run: |
          poetry run ruff check .
          poetry run black --check .

      - name: Run static analysis
        run: poetry run bandit -c pyproject.toml -ll -ii -r apps packages

      - name: Run dependency audit
        run: poetry run pip-audit --ignore-vuln PYSEC-2026-1325

      - name: Run tests and coverage
        env:
          TEST_DATABASE_URL: "postgresql+asyncpg://cadence:cadence_password@localhost:5432/cadence_edc"
        run: poetry run pytest
